version: '3.8'

services:
  opkey_agent_api:
    build: .
    container_name: opkey_agent_api
    # ... keep your existing environment or volumes keys completely unchanged ...
    ports:
      - "8000:8000" # This is your FastAPI backend endpoint
      - "7865:7860" # Gradio UI web page
    volumes:
      - .:/workspace
      - chroma_data:/workspace/chroma_db
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}

volumes:
  chroma_data:
