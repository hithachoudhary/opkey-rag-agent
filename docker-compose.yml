version: '3.8'

services:
  api:
    build: .
    container_name: opkey_agent_api
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - .:/workspace
      - chroma_data:/workspace/chroma_db
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}

volumes:
  chroma_data:
